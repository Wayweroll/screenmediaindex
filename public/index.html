<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Screen Media Index</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">PSC Library</p>
        <h1>Screen Media Index</h1>
      </div>
      <div class="count" id="count">Loading...</div>
    </header>

    <main class="layout">
      <aside class="filters" aria-label="Filters">
        <label>
          Search
          <input id="search" type="search" placeholder="Film, author, keyword, theory...">
        </label>

        <label>
          Source
          <select id="sourceType">
            <option value="">All sources</option>
          </select>
        </label>

        <label>
          Section
          <select id="section">
            <option value="">All sections</option>
          </select>
        </label>

        <label>
          Teaching use
          <select id="teachingUse">
            <option value="">All uses</option>
          </select>
        </label>

        <label>
          Year
          <select id="year">
            <option value="">All years</option>
          </select>
        </label>

        <button id="reset" type="button">Reset filters</button>
      </aside>

      <section class="results" aria-live="polite">
        <div class="result-list" id="results"></div>
        <button class="load-more" id="loadMore" type="button">Load more</button>
      </section>
    </main>

    <dialog id="detailDialog">
      <article class="detail">
        <button class="close" id="closeDetail" type="button" aria-label="Close">x</button>
        <p class="eyebrow" id="detailSource"></p>
        <h2 id="detailTitle"></h2>
        <dl id="detailMeta"></dl>
        <p id="detailSummary"></p>
        <div class="keywords" id="detailKeywords"></div>
      </article>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
